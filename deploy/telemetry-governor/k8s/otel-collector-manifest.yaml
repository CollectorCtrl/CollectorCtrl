apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-governor-collector-config
  namespace: default
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        send_batch_size: 8192
        timeout: 5s
        send_batch_max_size: 10240
    exporters:
      clickhouse:
        endpoint: tcp://clickhouse:9000?database=telemetry_governor
        create_schema: true
        ttl: 24h
    service:
      pipelines:
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [clickhouse]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-governor-collector
  namespace: default
  labels:
    app: telemetry-governor-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-governor-collector
  template:
    metadata:
      labels:
        app: telemetry-governor-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        command:
        - "--config=/conf/otel-collector-config.yaml"
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        volumeMounts:
        - name: collector-config-vol
          mountPath: /conf
      volumes:
      - name: collector-config-vol
        configMap:
          name: telemetry-governor-collector-config
          items:
          - key: otel-collector-config.yaml
            path: otel-collector-config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-governor-collector
  namespace: default
spec:
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  selector:
    app: telemetry-governor-collector
  type: ClusterIP
